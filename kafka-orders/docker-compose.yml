# Redpanda — a single-binary, Kafka-API-compatible broker for the demo. Exposes the Kafka
# protocol on 9092 and the admin API on 9644.
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
      - --kafka-addr=internal://0.0.0.0:9093,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://localhost:9093,external://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 12
