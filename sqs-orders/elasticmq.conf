// ElasticMQ — a free, SQS-compatible broker for the demo. This config pre-creates
// the `orders` queue and pins the node address to localhost so the queue URLs it
// hands back (via GetQueueUrl) are reachable from the host running the producer/consumer.
include classpath("application.conf")

node-address {
    protocol = http
    host = localhost
    port = 9324
    context-path = ""
}

rest-sqs {
    enabled = true
    bind-port = 9324
    bind-hostname = "0.0.0.0"
}

queues {
    orders {}
}
